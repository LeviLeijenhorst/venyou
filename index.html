<!doctype html>
<html lang="nl">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>VENYOU</title>
    <meta name="description" content="VENYOU">
    <meta property="og:title" content="VENYOU">
    <meta property="og:description" content="Muziek eerst.">
    <meta property="og:type" content="website">
    <link rel="icon" href="assets/favicon.png">
    <style>
      :root {
        color-scheme: light;
        --paper: #f7f3e8;
        --ink: #171717;
        --groove: #2a2927;
        --label: #df352f;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        min-height: 100%;
        margin: 0;
      }

      body {
        overflow: hidden;
        background: var(--paper);
        color: var(--ink);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .record-wall {
        min-height: 100vh;
        display: grid;
        place-items: center;
        position: relative;
        isolation: isolate;
        background-color: var(--paper);
        background-image:
          radial-gradient(circle, var(--label) 0 18%, transparent 19%),
          repeating-radial-gradient(circle, var(--ink) 0 9%, var(--groove) 10% 14%),
          radial-gradient(circle, transparent 0 67%, rgba(247, 243, 232, 0.42) 68% 70%, transparent 71%),
          radial-gradient(circle, rgba(0, 0, 0, 0.18) 0 68%, transparent 69%);
        background-size: 1.5cm 1.5cm;
        background-position: 0 0, 0 0, 0 0, 0.05cm 0.05cm;
      }

      .record-wall::before {
        content: "";
        position: absolute;
        inset: 0;
        z-index: -1;
        background:
          linear-gradient(90deg, rgba(247, 243, 232, 0.16), transparent 18% 82%, rgba(247, 243, 232, 0.16)),
          linear-gradient(180deg, rgba(247, 243, 232, 0.18), transparent 22% 78%, rgba(247, 243, 232, 0.18));
      }

      h1 {
        margin: 0;
        color: var(--paper);
        font-size: clamp(3rem, 9vw, 8rem);
        line-height: 0.9;
        letter-spacing: 0;
        text-align: center;
        text-transform: none;
        text-shadow:
          0 0.035em 0 var(--ink),
          0.035em 0.035em 0 var(--ink),
          -0.035em 0.035em 0 var(--ink),
          0.065em 0.065em 0 rgba(0, 0, 0, 0.28);
      }

      @media (max-width: 520px) {
        .record-wall {
          background-size: 1.35cm 1.35cm;
        }

        h1 {
          font-size: clamp(2.8rem, 18vw, 5rem);
        }
      }
    </style>
  </head>
  <body>
    <main class="record-wall" aria-label="VENYOU">
      <h1>VenYou</h1>
    </main>
  </body>
</html>
