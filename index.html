<!doctype html>
<html lang="nl">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>VENYOU</title>
    <meta name="description" content="VENYOU">
    <meta property="og:title" content="VENYOU">
    <meta property="og:description" content="Muziek eerst.">
    <meta property="og:type" content="website">
    <link rel="icon" href="assets/favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600;12..96,800&display=swap" rel="stylesheet">
    <style>
      :root {
        color-scheme: dark;
        --bg: #100418;
        --bg-dim: #1E0A30;
        --bg-lift: #2A0C3A;
        --night: #08020F;
        --ink: #FFF4E8;
        --coral: #FF2D87;
        --uv: #9B5CFF;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        min-height: 100%;
        margin: 0;
      }

      body {
        overflow: hidden;
        background: var(--bg);
        color: var(--ink);
        font-family: "Bricolage Grotesque", ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .record-wall {
        min-height: 100vh;
        display: grid;
        place-items: center;
        position: relative;
        isolation: isolate;
        background-color: var(--bg);
        background-image:
          radial-gradient(circle, var(--coral) 0 18%, transparent 19%),
          repeating-radial-gradient(circle, var(--night) 0 9%, var(--bg-dim) 10% 14%),
          radial-gradient(circle, transparent 0 67%, rgba(255, 244, 232, 0.13) 68% 70%, transparent 71%),
          radial-gradient(circle, rgba(155, 92, 255, 0.2) 0 68%, transparent 69%);
        background-size: 1.5cm 1.5cm;
        background-position: 0 0, 0 0, 0 0, 0.05cm 0.05cm;
      }

      .record-wall::before {
        content: "";
        position: absolute;
        inset: 0;
        z-index: -1;
        background:
          radial-gradient(circle at center, rgba(255, 45, 135, 0.18), transparent 34%),
          linear-gradient(90deg, rgba(8, 2, 15, 0.2), transparent 18% 82%, rgba(8, 2, 15, 0.2)),
          linear-gradient(180deg, rgba(8, 2, 15, 0.18), transparent 22% 78%, rgba(8, 2, 15, 0.18));
      }

      h1 {
        margin: 0;
        color: var(--ink);
        font-size: clamp(3rem, 9vw, 8rem);
        font-weight: 800;
        line-height: 0.9;
        letter-spacing: 0;
        text-align: center;
        text-transform: none;
        text-shadow:
          0 0.035em 0 var(--night),
          0.035em 0.035em 0 var(--coral),
          -0.035em 0.035em 0 var(--uv),
          0 0 0.42em rgba(255, 45, 135, 0.34);
      }

      @media (max-width: 520px) {
        .record-wall {
          background-size: 1.35cm 1.35cm;
        }

        h1 {
          font-size: clamp(2.8rem, 18vw, 5rem);
        }
      }
    </style>
  </head>
  <body>
    <main class="record-wall" aria-label="VENYOU">
      <h1>VenYou</h1>
    </main>
  </body>
</html>
